name: Build index.html

on:
  push:
    paths:
      - 'src/**'
      - 'build.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild index.html from src/
        run: node build.js

      - name: Commit rebuilt index.html + version.json (only if changed)
        run: |
          git config user.name  "kgh-build-bot"
          git config user.email "kgh-build-bot@users.noreply.github.com"
          # Stage both build outputs. version.json is generated by build.js
          # alongside index.html; `git add` handles it whether it is a new
          # (untracked) file on first run or a modification thereafter.
          git add index.html version.json
          # `git diff --cached --quiet` is true when nothing is staged, which
          # correctly covers BOTH "no changes" and "version.json newly added"
          # — unlike `git diff --quiet` on the worktree, which ignores
          # untracked files and would miss version.json's first appearance.
          if git diff --cached --quiet; then
            echo "index.html and version.json already up to date — nothing to commit."
          else
            git commit -m "Build: regenerate index.html + version.json from src/ [skip ci]"
            git push
            echo "index.html and version.json rebuilt and pushed."
          fi
