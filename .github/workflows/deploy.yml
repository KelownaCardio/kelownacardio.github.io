name: Build index.html

on:
  push:
    paths:
      - 'src/**'
      - 'build.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild index.html from src/
        run: node build.js

      - name: Commit rebuilt index.html (only if it changed)
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html is already up to date — nothing to commit."
          else
            git config user.name  "kgh-build-bot"
            git config user.email "kgh-build-bot@users.noreply.github.com"
            git add index.html
            git commit -m "Build: regenerate index.html from src/ [skip ci]"
            git push
            echo "index.html rebuilt and pushed."
          fi
