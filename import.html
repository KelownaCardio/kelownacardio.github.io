<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KGH Cardiology · Meditech Import</title>
<style>
  :root {
    --bg: #f0f0ed;
    --panel: #ffffff;
    --ink: #18191c;
    --ink2: #52555c;
    --ink3: #8e9099;
    --line: #e0dfd8;
    --blue: #1a5fa8;
    --blue-bg: #e8f0fb;
    --green: #1a7a35;
    --green-bg: #d4f0dd;
    --amber: #8a5a00;
    --amber-bg: #fdf0d4;
    --red: #b32018;
    --red-bg: #fde8e6;
    --r: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--ink); font-size: 14px; min-height: 100vh; }

  .hdr { background: #1a1f2e; color: #fff; padding: 14px 20px;
         display: flex; align-items: center; gap: 12px; }
  .hdr-title { font-size: 15px; font-weight: 700; }
  .hdr-sub { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 1px; }

  .wrap { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }

  .card { background: var(--panel); border-radius: var(--r);
          border: 1px solid var(--line); padding: 16px; margin-bottom: 14px; }
  .card-title { font-size: 11px; font-weight: 700; color: var(--ink3);
                text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }

  /* Drop zone */
  .drop-zone { border: 2px dashed var(--line); border-radius: var(--r);
               background: var(--bg); padding: 32px 20px; text-align: center;
               cursor: pointer; transition: all .2s; }
  .drop-zone.over { border-color: var(--blue); background: var(--blue-bg); }
  .drop-zone.has-file { border-color: var(--green); background: var(--green-bg); }
  .drop-zone svg { width: 32px; height: 32px; stroke: var(--ink3); fill: none;
                   stroke-width: 1.5; margin-bottom: 8px; }
  .drop-zone.has-file svg { stroke: var(--green); }
  .drop-big { font-size: 15px; font-weight: 600; color: var(--ink2); margin-bottom: 4px; }
  .drop-sub { font-size: 12px; color: var(--ink3); }
  input[type=file] { display: none; }

  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px;
         border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
         font-family: inherit; cursor: pointer; transition: opacity .15s; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-p { background: var(--blue); color: #fff; width: 100%; justify-content: center; margin-top: 10px; }
  .btn-g { background: var(--green); color: #fff; width: 100%; justify-content: center; }
  .btn-s { background: var(--line); color: var(--ink); }

  .status { padding: 10px 12px; border-radius: 8px; font-size: 13px;
            font-weight: 600; margin-top: 10px; display: none; }
  .status.info   { background: var(--blue-bg);  color: var(--blue); }
  .status.ok     { background: var(--green-bg); color: var(--green); }
  .status.warn   { background: var(--amber-bg); color: var(--amber); }
  .status.err    { background: var(--red-bg);   color: var(--red); }

  /* Summary pills */
  .pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .pill { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .pill-blue  { background: var(--blue-bg);  color: var(--blue); }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-grey  { background: var(--line);     color: var(--ink2); }

  /* Patient rows */
  .patient-list { display: flex; flex-direction: column; gap: 8px; }
  .pat-row { border: 1px solid var(--line); border-radius: 8px; padding: 12px;
             display: flex; gap: 10px; align-items: flex-start; }
  .pat-row.new-consult { border-color: #e8a0a0; background: #fff8f8; }
  .pat-row.location-update { border-color: #a8c4e8; background: #f4f8fd; }
  .pat-row.demo-update { border-color: #a8c4e8; background: #f4f8fd; }
  .pat-row.ignored { opacity: .7; }
  .pat-check { margin-top: 2px; flex-shrink: 0; width: 18px; height: 18px; cursor: pointer; }
  .pat-body { flex: 1; min-width: 0; }
  .pat-name { font-size: 14px; font-weight: 700; }
  .pat-meta { font-size: 12px; color: var(--ink2); margin-top: 3px; }
  .pat-dx   { font-size: 12px; color: var(--ink);  margin-top: 3px; }
  .pat-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .tag { padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; }
  .tag-red   { background: var(--red-bg);   color: var(--red); }
  .tag-blue  { background: var(--blue-bg);  color: var(--blue); }
  .tag-green { background: var(--green-bg); color: var(--green); }
  .tag-amber { background: var(--amber-bg); color: var(--amber); }
  .tag-grey  { background: var(--line);     color: var(--ink2); }

  .sec-label { font-size: 11px; font-weight: 700; color: var(--ink3);
               text-transform: uppercase; letter-spacing: .5px;
               margin: 16px 0 6px; }

  .log { font-family: ui-monospace, "SF Mono", monospace; font-size: 11px;
         background: #1a1f2e; color: #c8d0e0; padding: 12px; border-radius: 8px;
         max-height: 260px; overflow-y: auto; margin-top: 10px; }
  .log .ok   { color: #6ee7a0; }
  .log .err  { color: #f08080; }
  .log .inf  { color: #80b4f0; }
  .log .warn { color: #ffd080; }
  .log .step { color: #fff; font-weight: bold; border-top: 1px solid #333; 
               margin-top: 4px; padding-top: 4px; }
  .log .ts   { color: #556; font-size: 10px; margin-right: 6px; }

  .spinner { display: inline-block; width: 12px; height: 12px;
             border: 2px solid currentColor; border-top-color: transparent;
             border-radius: 50%; animation: spin .7s linear infinite;
             vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .conf-badge { font-size: 10px; font-weight: 600; }
  .conf-high { color: var(--green); }
  .conf-low  { color: var(--amber); }

  #preview-section { display: none; }
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">KGH Cardiology · Meditech Import</div>
    <div class="hdr-sub">Routes through Apps Script → Anthropic · No Cloudflare needed</div>
  </div>
</div>

<div class="wrap">

  <!-- Step 1: Upload -->
  <div class="card">
    <div class="card-title">Step 1 — Upload Meditech SB Rounds List PDF</div>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="18"/><polyline points="9 15 12 12 15 15"/></svg>
      <div class="drop-big" id="dropLabel">Drop PDF here or tap to browse</div>
      <div class="drop-sub">Meditech → SB Rounds List → Print to PDF</div>
    </div>
    <input type="file" id="fileInput" accept="application/pdf,image/png,image/jpeg,image/jpg">
    <button class="btn btn-p" id="parseBtn" disabled>
      <span id="parseBtnLabel">Parse with AI</span>
    </button>
    <div class="status" id="parseStatus"></div>
  </div>

  <!-- Step 2: Preview & Commit -->
  <div id="preview-section">
    <div class="card">
      <div class="card-title">Step 2 — Review &amp; Confirm</div>
      <div class="pills" id="pills"></div>
      <div class="patient-list" id="patientList"></div>
      <div style="margin-top:14px;display:flex;gap:8px">
        <button class="btn btn-g" id="commitBtn">Commit selected to Google Sheet</button>
        <button class="btn btn-s" id="cancelBtn">Clear</button>
      </div>
      <div class="status" id="commitStatus"></div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <!-- Debug panel -->
  <div class="card" id="debug-card" style="display:none;margin-top:0">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>Debug log — step by step</span>
      <button onclick="copyDebug()"
        style="font-size:10px;padding:2px 8px;border:1px solid var(--line);border-radius:4px;
               background:none;cursor:pointer;font-family:inherit">Copy log</button>
    </div>
    <div class="log" id="debug-log" style="max-height:320px"></div>
  </div>

</div>

<script>
// ── Config ────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzQOQa6dZCCyXu15jvkyUTFghtnhGzZFj4NZ4uyczxLov72zj8qNZIgk9pzL4i8Dfuy5Q/exec';
const SHARED_KEY      = 'kgh2026';

// KGH location code decoder (mirrors app logic)
const LOC_MAP = {
  SCCU: 'CCU', CCU: 'CCU',
  S2W: '2W', S2S: '2S',
  CSICU: 'CSICU', ICSI: 'CSICU',
  ICUA: 'ICUA', ICUB: 'ICUB',
  R4A: '4A', R4B: '4B', R5B: '5B',
  C6W: '6W', C1C: 'C1C',
  CEOF: 'ED', CMT: 'ED',
  AREH: 'REH', SHAH: 'HAH',
  S3E: '3E', S3W: '3W', S3MU: '3MU',
  S4E: '4E', S4W: '4W',
};

function parseLocCode(locCode, roomBed) {
  var ward = 'OTHER';
  var room = '';
  var loc = (locCode || '').toUpperCase();
  for (var key in LOC_MAP) {
    if (loc.indexOf(key) !== -1) { ward = LOC_MAP[key]; break; }
  }
  var rb = (roomBed || '').replace(/-/g,'').toUpperCase()
    .replace(/^KGHS/,'').replace(/^KGHR/,'').replace(/^KGHC/,'').replace(/^KGHAC/,'');
  if (ward === 'CCU') {
    var n = parseInt(rb, 10);
    if (!isNaN(n)) room = String(n % 100 || n);
  } else {
    var m = rb.match(/^0*(\d+)([A-Z]?)$/);
    if (m) room = m[1] + m[2];
    else if (rb.match(/^(3MU|C1C|EDOF|HAH|REH)/i)) room = rb;
  }
  return { ward, room };
}

function fmtDate(d) {
  if (!d) return '';
  d = String(d).trim();
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(d)) return d;
  if (/^\d{2}\/\d{2}\/\d{2}$/.test(d)) {
    var p = d.split('/'); return p[0]+'/'+p[1]+'/'+(parseInt(p[2]) > 30 ? '19'+p[2] : '20'+p[2]);
  }
  return d;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── State ─────────────────────────────────────────────────────────
let selectedFile   = null;
let parsedPatients = [];   // enriched with _action, _existingId, _highConf etc
let existingPats   = [];

// ── File input ────────────────────────────────────────────────────
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const parseBtn  = document.getElementById('parseBtn');

fileInput.addEventListener('change', e => setFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  setFile(e.dataTransfer.files[0]);
});

function setFile(f) {
  if (!f) return;
  selectedFile = f;
  dropZone.classList.add('has-file');
  document.getElementById('dropLabel').textContent = f.name + ' (' + (f.size/1024).toFixed(0) + ' KB)';
  parseBtn.disabled = false;
}

// ── Parse ─────────────────────────────────────────────────────────
parseBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  parseBtn.disabled = true;
  document.getElementById('parseBtnLabel').innerHTML = '<span class="spinner"></span>Parsing…';

  // Clear debug log
  document.getElementById('debug-log').innerHTML = '';
  document.getElementById('debug-card').style.display = 'block';
  dbgStep('Parse started');
  dbg(`File: ${selectedFile.name} (${(selectedFile.size/1024).toFixed(1)} KB, type: ${selectedFile.type || 'unknown'})`);

  try {
    // ── Step 1: Fetch API key from Apps Script ──────────────────────
    dbgStep('Step 1 — fetch API key from Apps Script');
    showStatus('parseStatus', 'info', '<span class="spinner"></span>Step 1/3 — fetching key from Apps Script…');

    const keyUrl = `${APPS_SCRIPT_URL}?key=${SHARED_KEY}&action=getAnthropicKey`;
    dbg(`GET ${keyUrl.slice(0, 80)}…`);

    let keyResp, keyData;
    try {
      keyResp = await fetch(keyUrl);
      dbg(`Apps Script response: HTTP ${keyResp.status} ${keyResp.statusText}`);
      if (!keyResp.ok) throw new Error(`HTTP ${keyResp.status}`);
    } catch(fetchErr) {
      dbgErr(`fetch() to Apps Script failed: ${fetchErr.message}`);
      dbgWarn('Possible causes: CORS, network block, Apps Script not deployed as "Anyone"');
      throw new Error('Apps Script unreachable: ' + fetchErr.message);
    }

    try {
      keyData = await keyResp.json();
      dbg(`Apps Script returned: ${JSON.stringify(keyData).slice(0, 120)}`);
    } catch(jsonErr) {
      const raw = await keyResp.text().catch(() => '(could not read body)');
      dbgErr(`Apps Script response was not JSON: ${raw.slice(0, 200)}`);
      throw new Error('Apps Script returned non-JSON');
    }

    if (!keyData.ok) {
      dbgErr(`Apps Script error: ${keyData.error}`);
      if ((keyData.error || '').includes('ANTHROPIC_KEY')) {
        dbgWarn('Fix: Apps Script editor → Project Settings → Script Properties → add ANTHROPIC_KEY');
      }
      throw new Error(keyData.error || 'Could not get API key');
    }

    const anthropicKey = keyData.key;
    dbgOk(`API key received (${anthropicKey.length} chars, starts: ${anthropicKey.slice(0,12)}…)`);

    // ── Step 2: Read file as base64 ────────────────────────────────
    dbgStep('Step 2 — reading PDF file');
    showStatus('parseStatus', 'info', '<span class="spinner"></span>Step 2/3 — reading file…');

    let b64;
    try {
      b64 = await fileToBase64(selectedFile);
      dbgOk(`File encoded: ${(b64.length/1024).toFixed(0)} KB base64`);
    } catch(readErr) {
      dbgErr(`FileReader failed: ${readErr.message}`);
      throw new Error('Could not read file: ' + readErr.message);
    }

    // ── Step 3: Call Anthropic directly ────────────────────────────
    dbgStep('Step 3 — calling Anthropic API directly from browser');
    showStatus('parseStatus', 'info', '<span class="spinner"></span>Step 3/3 — AI reading PDF (20–40 sec)…');
    dbg('POST https://api.anthropic.com/v1/messages');
    dbg('Model: claude-sonnet-4-5-20250929 | max_tokens: 8000');
    dbgWarn('If this hangs >60 sec, Anthropic may be unreachable from this network');

    const PROMPT =
      'This is a Meditech SB Rounds List PDF from Kelowna General Hospital (KGH).\n' +
      'Extract EVERY patient record.\n\n' +
      'Each patient block looks like:\n' +
      '  LOCATION_CODE  ROOM_BED_CODE\n' +
      '  LastName,FirstName MiddleName   F/M  Age  DD/MM/YYYY\n' +
      '  Health Care Num: 10digitPHN     MRP: ServiceName\n' +
      '  Admit Date/Time: DD/MM/YY HH:MM\n' +
      '  LOS: number\n' +
      '  Reason for Visit: diagnosis text\n\n' +
      'Return ONLY a JSON array. Each element:\n' +
      '{"last":"","first":"","sex":"","age":"","dob":"DD/MM/YYYY","phn":"10digits",' +
      '"locationCode":"KELKGH...","roomBed":"KGHS...","mrp":"exact MRP field value",' +
      '"reason":"full diagnosis","los":"number","admitDate":"DD/MM/YYYY"}\n\n' +
      'Rules: last/first split on first comma | phn=10 digits from Health Care Num |' +
      ' dob=DD/MM/YYYY rightmost date on name line | mrp=exact e.g. "CardiologyMRP,KGH Kelowna" |' +
      ' locationCode=KELKGH... | roomBed=KGHS.../KGHR...\n' +
      'Return ONLY the JSON array, no markdown.';

    let aiResp;
    try {
      aiResp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': anthropicKey,
          'anthropic-version': '2023-06-01',
          'anthropic-beta': 'pdfs-2024-09-25',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5-20250929',
          max_tokens: 8000,
          messages: [{ role: 'user', content: [
            { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: b64 } },
            { type: 'text', text: PROMPT }
          ]}]
        })
      });
      dbg(`Anthropic response: HTTP ${aiResp.status} ${aiResp.statusText}`);
    } catch(fetchErr) {
      dbgErr(`fetch() to Anthropic failed: ${fetchErr.message}`);
      dbgWarn('Possible causes: api.anthropic.com blocked on this network, CORS issue');
      dbgWarn('Try: open browser dev tools → Network tab to see the actual error');
      throw new Error('Anthropic unreachable: ' + fetchErr.message);
    }

    let aiData;
    try {
      aiData = await aiResp.json();
    } catch(jsonErr) {
      const raw = await aiResp.text().catch(() => '(unreadable)');
      dbgErr(`Anthropic response was not JSON: ${raw.slice(0, 200)}`);
      throw new Error('Anthropic returned non-JSON (HTTP ' + aiResp.status + ')');
    }

    if (aiData.error) {
      dbgErr(`Anthropic API error: ${JSON.stringify(aiData.error)}`);
      throw new Error('Anthropic: ' + (aiData.error.message || JSON.stringify(aiData.error)));
    }

    dbgOk(`Anthropic success — stop_reason: ${aiData.stop_reason}, usage: ${JSON.stringify(aiData.usage)}`);

    // ── Step 4: Parse JSON response ────────────────────────────────
    dbgStep('Step 4 — parsing Claude response');
    const text = (aiData.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    dbg(`Raw response length: ${text.length} chars`);
    dbg(`First 200 chars: ${text.slice(0, 200)}`);

    const clean = text.replace(/```json|```/g, '').trim();
    let patients;
    try {
      patients = JSON.parse(clean);
      if (!Array.isArray(patients)) patients = [patients];
      dbgOk(`Parsed ${patients.length} patient records`);
      // Log first patient as sanity check
      if (patients[0]) dbg(`First patient: ${JSON.stringify(patients[0]).slice(0, 150)}`);
    } catch(jsonErr) {
      dbgErr(`JSON.parse failed: ${jsonErr.message}`);
      dbgErr(`Raw text: ${clean.slice(0, 300)}`);
      throw new Error('Could not parse Claude response as JSON: ' + jsonErr.message);
    }

    // ── Step 5: Build preview ──────────────────────────────────────
    dbgStep('Step 5 — matching against existing patients in Sheet');
    showStatus('parseStatus', 'ok', `Parsed ${patients.length} patients. Fetching current list…`);
    await buildPreview(patients);
    dbgOk('Preview ready');

  } catch(err) {
    dbgErr(`FAILED: ${err.message}`);
    showStatus('parseStatus', 'err', 'Error: ' + err.message);
    console.error(err);
  } finally {
    parseBtn.disabled = false;
    document.getElementById('parseBtnLabel').textContent = 'Parse with AI';
  }
});

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = () => reject(new Error('Could not read file'));
    r.readAsDataURL(file);
  });
}

// ── Preview ───────────────────────────────────────────────────────
async function buildPreview(patients) {
  // Fetch current patients from Sheet for matching
  showStatus('parseStatus', 'info', '<span class="spinner"></span>Fetching current patient list…');
  try {
    const r = await fetch(`${APPS_SCRIPT_URL}?key=${SHARED_KEY}&action=listPatients`);
    const j = await r.json();
    existingPats = j.patients || [];
  } catch(e) {
    existingPats = [];
    console.warn('Could not fetch existing patients:', e);
  }

  // Build lookup maps
  const phnMap  = new Map();
  const nameMap = new Map();
  existingPats.forEach(ep => {
    const phn = String(ep.phn || '').replace(/\D/g,'');
    if (phn.length >= 9) phnMap.set(phn, ep);
    const nk = nameKey(ep.last, ep.first);
    if (nk) nameMap.set(nk, ep);
  });

  // Enrich each parsed patient
  parsedPatients = patients.map((p, i) => {
    const loc = parseLocCode(p.locationCode, p.roomBed);
    const mitPHN  = String(p.phn  || '').replace(/\D/g,'');
    const mitLast = (p.last  || '').toLowerCase().trim();
    const mitDOB  = fmtDate(p.dob);
    const mrpRaw  = (p.mrp  || '').trim();
    const isCardiologyMRP = /cardiologymrp/i.test(mrpRaw);

    // Match existing patient
    let existing = null;
    if (mitPHN.length >= 9) existing = phnMap.get(mitPHN);
    if (!existing) existing = nameMap.get(nameKey(p.last, p.first));

    // 2-of-3 confidence check
    let highConf = false, matchScore = 0;
    if (existing) {
      const epPHN  = String(existing.phn  || '').replace(/\D/g,'');
      const epLast = (existing.last || '').toLowerCase().trim();
      const epDOB  = fmtDate(existing.dob);
      const phnMatch  = mitPHN && epPHN && mitPHN === epPHN;
      const lastMatch = mitLast && epLast && mitLast === epLast;
      const dobMatch  = mitDOB && epDOB && mitDOB === epDOB;
      matchScore = (phnMatch?1:0) + (lastMatch?1:0) + (dobMatch?1:0);
      highConf = matchScore >= 2;
    }

    // Determine action
    let action;
    if (existing) {
      action = 'update';
    } else if (isCardiologyMRP) {
      action = 'new-consult';
    } else {
      action = 'ignore';
    }

    return Object.assign({}, p, {
      _idx: i,
      _ward: loc.ward,
      _room: loc.room,
      _dob: mitDOB,
      _phn: mitPHN,
      _mrpRaw: mrpRaw,
      _isCardiologyMRP: isCardiologyMRP,
      _action: action,
      _existingId: existing ? existing.id : null,
      _existing: existing,
      _highConf: highConf,
      _matchScore: matchScore,
      _selected: false,  // ignored unchecked by default, but selectable
      _locationChanged: existing ? (existing.ward !== loc.ward || existing.bed !== loc.room) : true
    });
  });

  renderPreview();
}

function nameKey(last, first) {
  return (last||'').toLowerCase().trim() + ',' + (first||'').toLowerCase().trim().split(/\s+/)[0];
}

function renderPreview() {
  const updates    = parsedPatients.filter(p => p._action === 'update');
  const newConsult = parsedPatients.filter(p => p._action === 'new-consult');
  const ignored    = parsedPatients.filter(p => p._action === 'ignore');
  const locChanged = updates.filter(p => p._locationChanged);

  // Pills
  document.getElementById('pills').innerHTML = [
    `<div class="pill pill-blue">${updates.length} matched</div>`,
    `<div class="pill pill-green">${locChanged.length} location change${locChanged.length!==1?'s':''}</div>`,
    newConsult.length ? `<div class="pill pill-red" style="background:var(--red-bg);color:var(--red)">${newConsult.length} new Cardiology MRP</div>` : '',
    `<div class="pill pill-grey">${ignored.length} ignored</div>`
  ].join('');

  let html = '';

  // Location updates
  if (locChanged.length) {
    html += `<div class="sec-label">Location updates</div>`;
    html += locChanged.map(p => patRow(p)).join('');
  }

  // Unchanged matches (demographics may still be corrected)
  const unchanged = updates.filter(p => !p._locationChanged);
  if (unchanged.length) {
    html += `<div class="sec-label">Matched — location unchanged${unchanged.filter(p=>p._highConf).length ? ', demographics verified' : ''}</div>`;
    html += unchanged.map(p => patRow(p)).join('');
  }

  // New Cardiology MRP
  if (newConsult.length) {
    html += `<div class="sec-label">New Cardiology MRP — will be added as New Consult</div>`;
    html += newConsult.map(p => patRow(p)).join('');
  }

  // Ignored
  if (ignored.length) {
    html += `<div class="sec-label">Ignored — not Cardiology MRP (check to add manually)</div>`;
    html += ignored.map(p => patRow(p)).join('');
  }

  document.getElementById('patientList').innerHTML = html;

  // Checkbox listeners
  document.querySelectorAll('.pat-check').forEach(cb => {
    cb.addEventListener('change', e => {
      const idx = parseInt(e.target.dataset.idx);
      parsedPatients[idx]._selected = e.target.checked;
    });
  });

  document.getElementById('preview-section').style.display = 'block';
  document.getElementById('preview-section').scrollIntoView({ behavior:'smooth', block:'start' });
  showStatus('parseStatus', 'ok', `Parsed ${parsedPatients.length} patients — ${updates.length} matched, ${newConsult.length} new Cardiology MRP, ${ignored.length} ignored.`);
}

function patRow(p) {
  const ep = p._existing;
  const rowClass = p._action === 'new-consult' ? 'new-consult'
                 : p._action === 'update' && p._locationChanged ? 'location-update'
                 : p._action === 'update' ? 'demo-update'
                 : 'ignored';

  const locStr = p._ward + (p._room ? ' Rm ' + p._room : '');
  const oldLoc = ep ? (ep.ward + (ep.bed ? ' Rm ' + ep.bed : '')) : '';

  let tags = '';
  if (p._action === 'ignore') {
    tags += `<span class="tag tag-grey">MRP: ${esc(p._mrpRaw || 'unknown')}</span>`;
    tags += `<span class="tag tag-amber">⚠ Manual add — verify before committing</span>`;
  } else if (p._action === 'new-consult') {
    tags += `<span class="tag tag-red">New Consult — Not yet seen</span>`;
    tags += `<span class="tag tag-blue">${esc(p._ward)}</span>`;
    if (!p._phn) tags += `<span class="tag tag-amber">⚠ No PHN — scan sticker</span>`;
  } else if (p._action === 'update') {
    if (p._locationChanged) tags += `<span class="tag tag-blue">${esc(oldLoc)} → ${esc(locStr)}</span>`;
    else tags += `<span class="tag tag-grey">Location confirmed: ${esc(locStr)}</span>`;
    if (p._highConf) tags += `<span class="tag tag-green conf-high">✓ 2/3 match — demographics will update</span>`;
    else tags += `<span class="tag tag-amber conf-low">⚠ Low confidence — location only</span>`;
  }

  const metaParts = [];
  if (p._phn) metaParts.push('PHN ' + p._phn);
  if (p._dob) metaParts.push('DOB ' + p._dob);
  if (p.sex)  metaParts.push(p.sex);
  if (p.age)  metaParts.push(p.age + 'y');
  if (p.los)  metaParts.push('LOS ' + p.los + 'd');

  const canSelect = true;  // all patients selectable, ignored just unchecked by default

  return `<div class="pat-row ${rowClass}">
    <input type="checkbox" class="pat-check" data-idx="${p._idx}"
      ${p._selected ? 'checked' : ''} ${canSelect ? '' : 'disabled'}>
    <div class="pat-body">
      <div class="pat-name">${esc(p.last)}, ${esc(p.first)}</div>
      <div class="pat-meta">${esc(metaParts.join(' · '))}</div>
      ${p.reason ? `<div class="pat-dx">Dx: ${esc(p.reason)}</div>` : ''}
      <div class="pat-tags">${tags}</div>
    </div>
  </div>`;
}

// ── Commit ────────────────────────────────────────────────────────
document.getElementById('commitBtn').addEventListener('click', async () => {
  const selected = parsedPatients.filter(p => p._selected);
  if (!selected.length) {
    showStatus('commitStatus', 'warn', 'Nothing selected to commit.');
    return;
  }

  document.getElementById('commitBtn').disabled = true;
  document.getElementById('cancelBtn').disabled = true;
  showStatus('commitStatus', 'info', `<span class="spinner"></span>Writing ${selected.length} patients to Google Sheet…`);

  const log = document.getElementById('log');
  log.style.display = 'block';
  log.innerHTML = '';

  const toSend = selected.map(p => buildPayload(p));

  addLog(`Sending ${toSend.length} patients…`, 'inf');

  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        key: SHARED_KEY,
        action: 'bulkUpsertPatients',
        patients: toSend
      })
    });
    const result = await resp.json();
    if (!result.ok) throw new Error(result.error || 'Unknown error');

    addLog(`✓ Inserted: ${result.inserted}`, 'ok');
    addLog(`✓ Updated:  ${result.updated}`, 'ok');
    if (result.skipped) addLog(`· Skipped:  ${result.skipped}`, 'inf');
    (result.errors || []).forEach(e => addLog('✗ ' + e, 'err'));

    showStatus('commitStatus', 'ok',
      `Done — ${result.inserted} new, ${result.updated} updated. App will pick up on next sync.`);
  } catch(err) {
    addLog('✗ ' + err.message, 'err');
    showStatus('commitStatus', 'err', 'Commit failed: ' + err.message);
  } finally {
    document.getElementById('commitBtn').disabled = false;
    document.getElementById('cancelBtn').disabled = false;
  }
});

document.getElementById('cancelBtn').addEventListener('click', () => {
  document.getElementById('preview-section').style.display = 'none';
  parsedPatients = [];
  document.getElementById('log').style.display = 'none';
  hideStatus('commitStatus');
});

function buildPayload(p) {
  // For updates: only send demographic fields if high confidence
  const ep = p._existing;
  const payload = {
    phn:       p._phn || (ep ? ep.phn : ''),
    last:      p._highConf ? (p.last || '') : (ep ? ep.last : p.last || ''),
    first:     p._highConf ? (p.first || '') : (ep ? ep.first : p.first || ''),
    dob:       p._highConf ? (p._dob || '') : (ep ? ep.dob : p._dob || ''),
    sex:       p._highConf ? (p.sex || '') : (ep ? ep.sex : p.sex || ''),
    ward:      p._ward,
    bed:       p._room,
    admitDate: p.admitDate ? fmtDate(p.admitDate) : (ep ? ep.admitDate : ''),
    addedVia:  'meditech',
  };

  if (p._action === 'new-consult') {
    payload.list       = 'on';
    payload.role       = 'mrp';
    payload.mrp        = 'Cardiology';
    payload.care       = (p._ward === 'CCU' || p._ward === 'CSICU') ? 'ccu' : 'daily';
    payload.newConsult = true;
    payload.needsSticker = !p._phn;
    payload.icd        = '';
  } else if (p._action === 'ignore') {
    // Manually selected non-Cardiology patient — add as off-service consultant
    payload.list       = 'off';
    payload.role       = 'consultant';
    payload.mrp        = p._mrpRaw || '';
    payload.care       = 'directive';
    payload.newConsult = false;
    payload.needsSticker = !p._phn;
    payload.icd        = '';
  } else if (ep) {
    // Preserve existing service fields
    payload.id         = ep.id;
    payload.list       = ep.list;
    payload.role       = ep.role;
    payload.mrp        = ep.mrp;
    payload.care       = ep.care;
    payload.icd        = ep.icd;
    payload.refby      = ep.refby;
    payload.refbyName  = ep.refbyName;
    payload.roundedToday = ep.roundedToday;
    payload.discharged = ep.discharged;
    payload.newConsult = ep.newConsult;
    payload.needsSticker = !payload.phn;
  }

  return payload;
}

// ── Helpers ───────────────────────────────────────────────────────
function showStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'status ' + type;
  el.innerHTML = msg;
  el.style.display = 'block';
}
function hideStatus(id) {
  const el = document.getElementById(id);
  el.style.display = 'none';
}
function addLog(msg, cls) {
  // Commit log (shown after parse in the result card)
  const log = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

// ── Debug panel ───────────────────────────────────────────────────
function dbg(msg, cls) {
  cls = cls || 'inf';
  const panel = document.getElementById('debug-card');
  const log   = document.getElementById('debug-log');
  if (!panel || !log) return;
  panel.style.display = 'block';
  const ts   = new Date().toTimeString().slice(0,8);
  const line = document.createElement('div');
  line.innerHTML = `<span class="ts">${ts}</span><span class="${cls}">${escHtml(String(msg))}</span>`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
  console.log(`[KGH-IMPORT ${ts}] ${msg}`);
}
function dbgStep(msg) { dbg('── ' + msg + ' ──', 'step'); }
function dbgOk(msg)   { dbg('✓ ' + msg, 'ok'); }
function dbgErr(msg)  { dbg('✗ ' + msg, 'err'); }
function dbgWarn(msg) { dbg('⚠ ' + msg, 'warn'); }

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyDebug() {
  const log = document.getElementById('debug-log');
  const text = Array.from(log.querySelectorAll('div'))
    .map(d => d.textContent).join('\n');
  navigator.clipboard.writeText(text).then(() => alert('Debug log copied!'));
}
</script>
